<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nav4</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <!-- Swiper.js -->
    <link
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;0,900;1,700&family=Epilogue:wght@300;400;500;600;700&family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ================================================================
       SHARED VARIABLES
    ================================================================ */
      :root {
        --yk-font-sans: "Plus Jakarta Sans", sans-serif;
        --yk-font-serif: "Instrument Serif", serif;
        --yk-font-display: "Oxanium", sans-serif;
        --yk-font-elegant: "Fraunces", serif;
        --yk-font-mono: "DM Mono", monospace;

        --yk-easing: cubic-bezier(0.4, 0, 0.2, 1);
        --yk-transition: 0.25s var(--yk-easing);
      }

      /* ================================================================
       NAVBAR 4 — CENTER LOGO NAVIGATION
       Aesthetic: Magazine / luxury editorial split nav
    ================================================================ */

      .yk-nav4 {
        background: #faf9f7;
        border-bottom: 1px solid #e8e4dc;
        padding: 0;
        font-family: var(--yk-font-sans);
      }

      .yk-nav4 .yk-n4-top {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 20px 0;
        gap: 24px;
      }

      .yk-nav4 .yk-n4-left,
      .yk-nav4 .yk-n4-right {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .yk-nav4 .yk-n4-right {
        justify-content: flex-end;
      }

      .yk-nav4 .yk-n4-logo-wrap {
        text-align: center;
      }

      .yk-nav4 .yk-n4-logo {
        font-family: var(--yk-font-elegant);
        font-size: 1.65rem;
        font-weight: 700;
        color: #1a1714;
        letter-spacing: -0.02em;
        line-height: 1;
        text-decoration: none;
        display: inline-block;
      }

      .yk-nav4 .yk-n4-logo em {
        font-style: italic;
        font-weight: 300;
        color: #8b7355;
      }

      .yk-nav4 .yk-n4-tagline {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #b8aa98;
        display: block;
        margin-top: 3px;
        font-family: var(--yk-font-sans);
        font-weight: 500;
      }

      .yk-nav4 .nav-link {
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #6b5f52;
        padding: 5px 12px !important;
        transition: color var(--yk-transition);
        position: relative;
      }

      .yk-nav4 .nav-link::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 12px;
        right: 12px;
        height: 1px;
        background: #8b7355;
        transform: scaleX(0);
        transition: transform var(--yk-transition);
      }

      .yk-nav4 .nav-link:hover {
        color: #1a1714;
      }
      .yk-nav4 .nav-link:hover::after {
        transform: scaleX(1);
      }
      .yk-nav4 .nav-link.active {
        color: #1a1714;
      }
      .yk-nav4 .nav-link.active::after {
        transform: scaleX(1);
      }

      .yk-nav4 .yk-n4-icon-link {
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #7a6e62;
        border-radius: 7px;
        transition:
          background var(--yk-transition),
          color var(--yk-transition);
        text-decoration: none;
        font-size: 0.95rem;
      }
      .yk-nav4 .yk-n4-icon-link:hover {
        background: #ede9e3;
        color: #1a1714;
      }

      .yk-nav4 .yk-n4-mobile-row {
        display: none;
        padding-bottom: 16px;
      }

      .yk-nav4 .navbar-toggler {
        border: 1px solid #d8d0c4;
        border-radius: 7px;
        padding: 5px 9px;
      }
      .yk-nav4 .navbar-toggler:focus {
        box-shadow: none;
      }
      .yk-nav4 .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%2890,80,68,0.8%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
      }

      @media (max-width: 991px) {
        .yk-nav4 .yk-n4-top {
          grid-template-columns: 1fr auto;
        }
        .yk-nav4 .yk-n4-left {
          display: none;
        }
        .yk-nav4 .yk-n4-right {
          display: none;
        }
        .yk-nav4 .yk-n4-mobile-row {
          display: block;
        }
        .yk-nav4 .yk-n4-mobile-row .nav-link {
          padding: 9px 0 !important;
          border-bottom: 1px solid #ede9e3;
        }
        .yk-nav4 .yk-n4-mobile-row .nav-link::after {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <nav class="yk-nav4 navbar navbar-expand-lg">
      <div class="container">
        <!-- Desktop: grid layout with logo centered -->
        <div class="yk-n4-top w-100 d-none d-lg-grid">
          <!-- Left links -->
          <div class="yk-n4-left">
            <ul class="navbar-nav flex-row gap-1">
              <li class="nav-item">
                <a class="nav-link active" href="#">Collections</a>
              </li>
              <li class="nav-item"><a class="nav-link" href="#">Atelier</a></li>
              <li class="nav-item">
                <a class="nav-link" href="#">Heritage</a>
              </li>
            </ul>
          </div>

          <!-- Center logo -->
          <div class="yk-n4-logo-wrap">
            <a class="yk-n4-logo" href="#"> La <em>Maison</em> </a>
            <span class="yk-n4-tagline">Est. Paris · 1924</span>
          </div>

          <!-- Right links + icons -->
          <div class="yk-n4-right">
            <ul class="navbar-nav flex-row gap-1 me-2">
              <li class="nav-item"><a class="nav-link" href="#">Stores</a></li>
              <li class="nav-item"><a class="nav-link" href="#">Journal</a></li>
            </ul>
            <a href="#" class="yk-n4-icon-link" title="Search">
              <i class="bi bi-search"></i>
            </a>
            <a href="#" class="yk-n4-icon-link" title="Wishlist">
              <i class="bi bi-heart"></i>
            </a>
            <a href="#" class="yk-n4-icon-link" title="Cart">
              <i class="bi bi-bag"></i>
            </a>
          </div>
        </div>

        <!-- Mobile: logo left + hamburger right -->
        <div
          class="d-flex d-lg-none align-items-center justify-content-between w-100"
        >
          <a class="yk-n4-logo" href="#">La <em>Maison</em></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#yk-nav4-menu"
            aria-controls="yk-nav4-menu"
            aria-expanded="false"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>

        <!-- Mobile menu -->
        <div class="collapse yk-n4-mobile-row w-100" id="yk-nav4-menu">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="#">Collections</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">Atelier</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Heritage</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Stores</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Journal</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </body>
</html>
