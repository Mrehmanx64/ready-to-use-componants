<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nav2</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <!-- Swiper.js -->
    <link
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;0,900;1,700&family=Epilogue:wght@300;400;500;600;700&family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --yk-font-sans: "Plus Jakarta Sans", sans-serif;
        --yk-font-serif: "Instrument Serif", serif;
        --yk-font-display: "Oxanium", sans-serif;
        --yk-font-elegant: "Fraunces", serif;
        --yk-font-mono: "DM Mono", monospace;

        --yk-easing: cubic-bezier(0.4, 0, 0.2, 1);
        --yk-transition: 0.25s var(--yk-easing);
      }

      /* ================================================================
       NAVBAR 2 — TRANSPARENT HERO NAVBAR
       Aesthetic: Glass-morphic, sits on dark hero backgrounds
    ================================================================ */

      .yk-nav2 {
        background: transparent;
        padding: 0;
        font-family: var(--yk-font-sans);
        position: relative;
        z-index: 100;
      }

      .yk-nav2::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.35) 0%,
          transparent 100%
        );
        pointer-events: none;
      }

      .yk-nav2 .yk-n2-inner {
        padding: 22px 0;
        position: relative;
        z-index: 1;
      }

      .yk-nav2 .yk-n2-logo {
        font-family: var(--yk-font-display);
        font-size: 1.3rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .yk-nav2 .yk-n2-gem {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #a78bfa, #60a5fa);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
      }

      .yk-nav2 .nav-link {
        font-size: 0.85rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.75);
        letter-spacing: 0.02em;
        padding: 6px 16px !important;
        border-radius: 100px;
        transition:
          color var(--yk-transition),
          background var(--yk-transition);
      }

      .yk-nav2 .nav-link:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.1);
      }

      .yk-nav2 .nav-link.active {
        color: #fff;
        background: rgba(255, 255, 255, 0.12);
      }

      .yk-nav2 .yk-n2-cta {
        font-size: 0.83rem;
        font-weight: 600;
        color: #fff;
        border: 1.5px solid rgba(255, 255, 255, 0.35);
        padding: 8px 22px;
        border-radius: 100px;
        text-decoration: none;
        transition: all var(--yk-transition);
        backdrop-filter: blur(8px);
        background: rgba(255, 255, 255, 0.08);
      }

      .yk-nav2 .yk-n2-cta:hover {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.6);
      }

      .yk-nav2 .navbar-toggler {
        border: 1.5px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        padding: 6px 10px;
      }
      .yk-nav2 .navbar-toggler:focus {
        box-shadow: none;
      }
      .yk-nav2 .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255,255,255,0.85%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
      }

      @media (max-width: 991px) {
        .yk-nav2 .navbar-collapse {
          background: rgba(10, 8, 22, 0.92);
          backdrop-filter: blur(20px);
          border-radius: 12px;
          margin-top: 12px;
          padding: 16px;
          border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .yk-nav2 .nav-link {
          padding: 9px 14px !important;
        }
        .yk-nav2 .yk-n2-cta {
          display: block;
          text-align: center;
          margin-top: 8px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ============================================================
      NAVBAR 2 — TRANSPARENT HERO NAVBAR
      Copy from here ↓
      Note: Place directly inside your hero section. The nav has
            position:relative so your hero needs position:relative too.
    ============================================================ -->
    <nav class="yk-nav2 navbar navbar-expand-lg">
      <div class="container">
        <div class="yk-n2-inner d-flex align-items-center w-100">
          <!-- Logo -->
          <a class="navbar-brand p-0 me-4" href="#">
            <div class="yk-n2-logo">
              <div class="yk-n2-gem">✦</div>
              ASTRA
            </div>
          </a>

          <!-- Hamburger -->
          <button
            class="navbar-toggler ms-auto border-0"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#yk-nav2-menu"
            aria-controls="yk-nav2-menu"
            aria-expanded="false"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Links -->
          <div class="collapse navbar-collapse" id="yk-nav2-menu">
            <ul class="navbar-nav mx-auto gap-1">
              <li class="nav-item">
                <a class="nav-link active" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Features</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Showcase</a>
              </li>
              <li class="nav-item"><a class="nav-link" href="#">Pricing</a></li>
              <li class="nav-item"><a class="nav-link" href="#">About</a></li>
            </ul>
            <div class="d-flex align-items-center gap-3">
              <a
                href="#"
                class="nav-link"
                style="
                  color: rgba(255, 255, 255, 0.65);
                  font-size: 0.85rem;
                  font-weight: 500;
                "
                >Sign in</a
              >
              <a href="#" class="yk-n2-cta">Start free trial</a>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </body>
</html>
