<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nav1</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <!-- Swiper.js -->
    <link
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;0,900;1,700&family=Epilogue:wght@300;400;500;600;700&family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --yk-font-sans: "Plus Jakarta Sans", sans-serif;
        --yk-font-serif: "Instrument Serif", serif;
        --yk-font-display: "Oxanium", sans-serif;
        --yk-font-elegant: "Fraunces", serif;
        --yk-font-mono: "DM Mono", monospace;

        --yk-easing: cubic-bezier(0.4, 0, 0.2, 1);
        --yk-transition: 0.25s var(--yk-easing);
      }
      /* ================================================================
       NAVBAR 1 — MINIMAL STARTUP
       Aesthetic: Razor-clean, paper-white, editorial spacing
    ================================================================ */

      .yk-nav1 {
        background: #ffffff;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        padding: 0;
        font-family: var(--yk-font-sans);
      }

      .yk-nav1 .navbar-brand .yk-n1-logo {
        font-family: var(--yk-font-sans);
        font-weight: 800;
        font-size: 1.15rem;
        letter-spacing: -0.04em;
        color: #0a0a0a;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .yk-nav1 .yk-n1-mark {
        width: 26px;
        height: 26px;
        background: #0a0a0a;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .yk-nav1 .yk-n1-mark span {
        width: 10px;
        height: 10px;
        background: #fff;
        border-radius: 2px;
        display: block;
      }

      .yk-nav1 .yk-n1-inner {
        padding: 18px 0;
      }

      .yk-nav1 .nav-link {
        font-family: var(--yk-font-sans);
        font-size: 0.82rem;
        font-weight: 500;
        color: #555;
        letter-spacing: 0.01em;
        padding: 6px 14px !important;
        border-radius: 6px;
        transition:
          color var(--yk-transition),
          background var(--yk-transition);
        position: relative;
      }

      .yk-nav1 .nav-link::after {
        content: "";
        position: absolute;
        bottom: 2px;
        left: 50%;
        transform: translateX(-50%) scaleX(0);
        width: 16px;
        height: 1.5px;
        background: #0a0a0a;
        border-radius: 2px;
        transition: transform var(--yk-transition);
      }

      .yk-nav1 .nav-link:hover {
        color: #0a0a0a;
      }
      .yk-nav1 .nav-link:hover::after {
        transform: translateX(-50%) scaleX(1);
      }
      .yk-nav1 .nav-link.active {
        color: #0a0a0a;
        font-weight: 600;
      }
      .yk-nav1 .nav-link.active::after {
        transform: translateX(-50%) scaleX(1);
      }

      .yk-nav1 .yk-n1-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .yk-nav1 .yk-n1-login {
        font-size: 0.82rem;
        font-weight: 500;
        color: #666;
        padding: 7px 14px;
        border-radius: 7px;
        text-decoration: none;
        transition:
          color var(--yk-transition),
          background var(--yk-transition);
      }
      .yk-nav1 .yk-n1-login:hover {
        color: #0a0a0a;
        background: #f5f5f5;
      }

      .yk-nav1 .yk-n1-cta {
        font-size: 0.82rem;
        font-weight: 600;
        color: #fff;
        background: #0a0a0a;
        padding: 7px 18px;
        border-radius: 7px;
        text-decoration: none;
        transition:
          opacity var(--yk-transition),
          transform var(--yk-transition);
        letter-spacing: -0.01em;
      }
      .yk-nav1 .yk-n1-cta:hover {
        opacity: 0.82;
        transform: translateY(-1px);
      }

      .yk-nav1 .navbar-toggler {
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 7px;
        padding: 6px 10px;
        box-shadow: none;
      }
      .yk-nav1 .navbar-toggler:focus {
        box-shadow: none;
      }
      .yk-nav1 .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%280,0,0,0.6%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
      }

      @media (max-width: 991px) {
        .yk-nav1 .navbar-collapse {
          padding: 12px 0 20px;
          border-top: 1px solid rgba(0, 0, 0, 0.06);
          margin-top: 12px;
        }
        .yk-nav1 .navbar-nav {
          gap: 2px;
        }
        .yk-nav1 .nav-link::after {
          display: none;
        }
        .yk-nav1 .yk-n1-actions {
          margin-top: 12px;
          flex-direction: column;
          align-items: flex-start;
          gap: 6px;
        }
        .yk-nav1 .yk-n1-login,
        .yk-nav1 .yk-n1-cta {
          width: 100%;
          text-align: center;
          display: block;
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ============================================================
      NAVBAR 1 — MINIMAL STARTUP
      Copy from here ↓
    ============================================================ -->
    <nav class="yk-nav1 navbar navbar-expand-lg">
      <div class="container">
        <div class="yk-n1-inner d-flex align-items-center w-100">
          <!-- Logo -->
          <a class="navbar-brand p-0 me-4" href="#">
            <div class="yk-n1-logo">
              <div class="yk-n1-mark"><span></span></div>
              Fieldwork
            </div>
          </a>

          <!-- Hamburger -->
          <button
            class="navbar-toggler ms-auto"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#yk-nav1-menu"
            aria-controls="yk-nav1-menu"
            aria-expanded="false"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Links -->
          <div class="collapse navbar-collapse" id="yk-nav1-menu">
            <ul class="navbar-nav me-auto gap-1">
              <li class="nav-item">
                <a class="nav-link active" href="#">Product</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Solutions</a>
              </li>
              <li class="nav-item"><a class="nav-link" href="#">Pricing</a></li>
              <li class="nav-item"><a class="nav-link" href="#">Docs</a></li>
              <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
            </ul>
            <div class="yk-n1-actions">
              <a href="#" class="yk-n1-login">Log in</a>
              <a href="#" class="yk-n1-cta">Get started</a>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <!-- Copy to here ↑ -->
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      /* ================================================================
     JQUERY — NAVBAR 1 (top info bar close — example utility)
     Generic helper: close any element with [data-yk-close]
  ================================================================ */
      $(document).on("click", "[data-yk-close]", function () {
        $(this).closest("[data-yk-dismissible]").slideUp(200);
      });
    </script>
  </body>
</html>
