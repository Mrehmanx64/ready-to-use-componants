<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nav5</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <!-- Swiper.js -->
    <link
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;0,900;1,700&family=Epilogue:wght@300;400;500;600;700&family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ================================================================
       SHARED VARIABLES
    ================================================================ */
      :root {
        --yk-font-sans: "Plus Jakarta Sans", sans-serif;
        --yk-font-serif: "Instrument Serif", serif;
        --yk-font-display: "Oxanium", sans-serif;
        --yk-font-elegant: "Fraunces", serif;
        --yk-font-mono: "DM Mono", monospace;

        --yk-easing: cubic-bezier(0.4, 0, 0.2, 1);
        --yk-transition: 0.25s var(--yk-easing);
      }
      /* ================================================================
       NAVBAR 5 — NAVBAR WITH CTA BUTTON
       Aesthetic: Modern dark SaaS, high contrast, conversion-focused
    ================================================================ */

      .yk-nav5 {
        background: #09090e;
        padding: 0;
        font-family: var(--yk-font-sans);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .yk-nav5 .yk-n5-inner {
        padding: 16px 0;
      }

      .yk-nav5 .yk-n5-logo {
        font-family: var(--yk-font-sans);
        font-weight: 800;
        font-size: 1.1rem;
        letter-spacing: -0.04em;
        color: #fff;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .yk-nav5 .yk-n5-logo-icon {
        width: 30px;
        height: 30px;
        background: linear-gradient(135deg, #f97316, #ec4899);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        flex-shrink: 0;
      }

      .yk-nav5 .nav-link {
        font-size: 0.84rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.55);
        padding: 7px 14px !important;
        border-radius: 8px;
        transition:
          color var(--yk-transition),
          background var(--yk-transition);
      }

      .yk-nav5 .nav-link:hover {
        color: rgba(255, 255, 255, 0.95);
        background: rgba(255, 255, 255, 0.07);
      }

      .yk-nav5 .nav-link.active {
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
      }

      .yk-nav5 .yk-n5-pill {
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: rgba(249, 115, 22, 0.2);
        color: #fb923c;
        border-radius: 100px;
        padding: 2px 8px;
        margin-left: 6px;
        vertical-align: middle;
      }

      .yk-nav5 .yk-n5-divider {
        width: 1px;
        height: 20px;
        background: rgba(255, 255, 255, 0.1);
        margin: 0 4px;
      }

      .yk-nav5 .yk-n5-login {
        font-size: 0.84rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.55);
        padding: 7px 14px;
        border-radius: 8px;
        text-decoration: none;
        transition:
          color var(--yk-transition),
          background var(--yk-transition);
      }
      .yk-nav5 .yk-n5-login:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.07);
      }

      .yk-nav5 .yk-n5-cta {
        font-size: 0.84rem;
        font-weight: 700;
        padding: 9px 22px;
        border-radius: 9px;
        text-decoration: none;
        letter-spacing: -0.01em;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #f97316 0%, #ec4899 100%);
        color: #fff;
        transition:
          opacity var(--yk-transition),
          transform var(--yk-transition),
          box-shadow var(--yk-transition);
      }

      .yk-nav5 .yk-n5-cta::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.12);
        opacity: 0;
        transition: opacity var(--yk-transition);
      }

      .yk-nav5 .yk-n5-cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(249, 115, 22, 0.45);
      }
      .yk-nav5 .yk-n5-cta:hover::before {
        opacity: 1;
      }

      .yk-nav5 .yk-n5-cta i {
        font-size: 0.9rem;
      }

      .yk-nav5 .navbar-toggler {
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 6px 10px;
      }
      .yk-nav5 .navbar-toggler:focus {
        box-shadow: none;
      }
      .yk-nav5 .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255,255,255,0.7%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
      }

      @media (max-width: 991px) {
        .yk-nav5 .navbar-collapse {
          border-top: 1px solid rgba(255, 255, 255, 0.07);
          margin-top: 14px;
          padding: 14px 0 4px;
        }
        .yk-nav5 .navbar-nav {
          gap: 2px;
        }
        .yk-nav5 .yk-n5-divider {
          display: none;
        }
        .yk-nav5 .yk-n5-login {
          display: block;
          padding: 8px 14px;
        }
        .yk-nav5 .yk-n5-cta {
          display: block;
          text-align: center;
          margin-top: 6px;
          padding: 11px;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <!-- ============================================================
      NAVBAR 5 — DARK SAAS NAVBAR WITH GRADIENT CTA
      Copy from here ↓
    ============================================================ -->
    <nav class="yk-nav5 navbar navbar-expand-lg">
      <div class="container">
        <div class="yk-n5-inner d-flex align-items-center w-100">
          <!-- Logo -->
          <a class="navbar-brand p-0 me-4" href="#">
            <div class="yk-n5-logo">
              <div class="yk-n5-logo-icon">
                <i class="bi bi-lightning-charge-fill text-white"></i>
              </div>
              Nexus
            </div>
          </a>

          <!-- Hamburger -->
          <button
            class="navbar-toggler ms-auto"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#yk-nav5-menu"
            aria-controls="yk-nav5-menu"
            aria-expanded="false"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Links -->
          <div class="collapse navbar-collapse" id="yk-nav5-menu">
            <ul class="navbar-nav me-auto gap-1">
              <li class="nav-item">
                <a class="nav-link active" href="#">Dashboard</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">
                  Pipelines
                  <span class="yk-n5-pill">New</span>
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Analytics</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Integrations</a>
              </li>
              <li class="nav-item"><a class="nav-link" href="#">Pricing</a></li>
            </ul>
            <div class="d-flex align-items-center">
              <a href="#" class="yk-n5-login">Log in</a>
              <div class="yk-n5-divider d-none d-lg-block"></div>
              <a href="#" class="yk-n5-cta">
                Start for free
                <i class="bi bi-arrow-right"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </body>
</html>
